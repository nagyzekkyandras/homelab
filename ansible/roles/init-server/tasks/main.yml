- name: render logind.conf
  template:
    src: logind.conf.j2
    dest: /etc/systemd/logind.conf
  notify: restart systemd-logind

- name: Base packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
